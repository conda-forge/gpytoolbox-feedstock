schema_version: 1

context:
  name: gpytoolbox
  version: "0.3.7"
  build_number: 2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/sgsellan/gpytoolbox/archive/v${{ version }}.tar.gz
    sha256: 826bc93720cd341c751a19a9ac0c772afcea3a5992854534fe2c44d2d6cf1940
    patches:
      - patches/0001-use-conda-wgpu-native.patch
      - patches/0002-honor-conda-cmake-args.patch
  # These C headers must match the generated C++ wrapper below. The current
  # conda-forge WebGPU C headers are source-incompatible with this wrapper.
  - url: https://raw.githubusercontent.com/eliemichel/WebGPU-distribution/9dd47f8515dfd7112b750da07e719460a88bf2e8/include/webgpu/webgpu.h
    sha256: 09e3fca980bfbb880b26b0d7fbdfd9d284a3faa99942d198c7a208f9be7a0bfb
    file_name: ext/webgpu-distribution-headers/webgpu/webgpu.h
  - url: https://raw.githubusercontent.com/eliemichel/WebGPU-distribution/9dd47f8515dfd7112b750da07e719460a88bf2e8/include/webgpu/wgpu.h
    sha256: a9310591ee1bc51928577f4140d12172b0257f253afce9838e53b665f0ee0d7f
    file_name: ext/webgpu-distribution-headers/webgpu/wgpu.h
  - url: https://raw.githubusercontent.com/eliemichel/WebGPU-distribution/9dd47f8515dfd7112b750da07e719460a88bf2e8/include/webgpu/webgpu.hpp
    sha256: 61ab357865b9d7d765f46837fe651c0ebd84e4f3955a9bea084f962fa539de46
    file_name: ext/webgpu-distribution-headers/webgpu/webgpu.hpp
  - url: https://raw.githubusercontent.com/eliemichel/WebGPU-distribution/9dd47f8515dfd7112b750da07e719460a88bf2e8/LICENSE.txt
    sha256: 46f069fb0e448fb4d5e9e21b3483912495381399656fe7a1190541b7bf74f668
    file_name: ext/webgpu-distribution-headers/LICENSE.txt

build:
  number: ${{ build_number }}
  # Upstream builds libigl's Embree integration, which currently supports
  # conda-forge's x86 and ARM targets but not linux-ppc64le.
  skip:
    - python_impl == "pypy"
    - match(python, ">=3.13")
  script:
    - python -m pip install . -vv --no-deps --no-build-isolation
    # wgpu-native 0.17.0.2 has a macOS install name with its build prefix.
    # Rewrite the extension dependency to the packaged dylib's rpath.
    - if: osx
      then: for lib in "${SP_DIR}"/gpytoolbox_bindings*.so; do old_path="$(otool -L "${lib}" | awk '/libwgpu_native[.]dylib/ {print $1; exit}')"; if [ -n "${old_path}" ]; then install_name_tool -change "${old_path}" "@rpath/libwgpu_native.dylib" "${lib}"; fi; done

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake >=3.16,<3.27
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - packaging
        - pip
        - pybind11
        - python
        - setuptools
        - wheel
    - if: linux
      then: make
  host:
    - packaging
    - pip
    - python
    - pybind11
    - setuptools
    - wheel
    - if: linux
      then: libgl-devel
    - if: linux
      then: libopengl-devel
    - if: linux
      then: xorg-libx11
    - if: linux
      then: xorg-xorgproto
    - if: linux
      then: xorg-libxrandr
    - if: linux
      then: xorg-libxinerama
    - if: linux
      then: xorg-libxcursor
    - if: linux
      then: xorg-libxi
    - if: linux
      then: libxkbcommon
    - nanoflann
    - if: linux
      then: wayland
    # gpytoolbox v0.3.4's generated WebGPU wrapper matches this runtime.
    # Newer 0.17.x headers remove or rename APIs used by upstream.
    - wgpu-native ==0.17.0.2
  run:
    - numpy >=1.22.4,<2.3
    - python
    - scikit-image
    - scipy >=1.7,<1.14
    - scs

tests:
  - python:
      imports:
        - gpytoolbox
        - gpytoolbox.copyleft
        - gpytoolbox_bindings
        - gpytoolbox_bindings_copyleft
  - script:
      - pip check
      - python run_test.py
      - python -c "import gpytoolbox as gpy; v, f = gpy.regular_square_mesh(2); assert v.shape[1] == 2; assert f.shape[1] == 3"
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python

about:
  homepage: https://github.com/sgsellan/gpytoolbox
  repository: https://github.com/sgsellan/gpytoolbox
  summary: A collection of utility functions to prototype geometry processing research in python
  license: MIT AND GPL-3.0-only
  license_file:
    - LICENSE.MIT
    - LICENSE.GPL
    - ext/webgpu-distribution-headers/LICENSE.txt

extra:
  recipe-maintainers:
    - jeongseok-meta
